<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchmode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; }
  #hero { padding: 2.5rem 1rem 1.2rem; text-align: center; }
  #hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 60px; letter-spacing: 4px; line-height: 1; color: #f0f0f0; }
  #hero h1 span { color: #E24B4A; }
  #hero p { font-size: 11px; color: #666; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }
  #tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.2rem; }
  .tab { padding: 7px 22px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #999; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all .15s; }
  .tab.active, .tab:hover { background: #E24B4A; color: #fff; border-color: #E24B4A; }
  #searchbar { display: flex; gap: 8px; padding: 0 1rem; max-width: 560px; margin: 0 auto 1.2rem; }
  #search-input { flex: 1; font-size: 15px; font-family: 'DM Sans', sans-serif; border-radius: 8px; border: 1px solid #2a2a2a; background: #161616; color: #f0f0f0; padding: 10px 16px; outline: none; transition: border-color .15s; }
  #search-input:focus { border-color: #E24B4A; }
  #search-input::placeholder { color: #444; }
  #search-btn { padding: 10px 22px; background: #E24B4A; color: #fff; border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; cursor: pointer; transition: opacity .15s, transform .1s; }
  #search-btn:hover { opacity: .85; }
  #search-btn:active { transform: scale(.97); }
  #status { font-size: 13px; color: #666; text-align: center; min-height: 18px; margin-bottom: .8rem; }
  #section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #555; padding: 0 1.2rem; margin-bottom: 12px; display: none; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; padding: 0 1rem 3rem; }
  .card { background: #161616; border-radius: 10px; overflow: hidden; border: 1px solid #1e1e1e; cursor: pointer; transition: transform .2s, border-color .2s; animation: fadeUp .3s ease both; }
  .card:hover { transform: translateY(-4px); border-color: #E24B4A; }
  .poster { position: relative; }
  .poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #111; }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.55); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; opacity: 0; transition: opacity .2s; }
  .card:hover .overlay { opacity: 1; }
  .play-circle { width: 46px; height: 46px; border-radius: 50%; background: #E24B4A; display: flex; align-items: center; justify-content: center; }
  .play-circle svg { width: 18px; height: 18px; fill: #fff; margin-left: 2px; }
  .watch-lbl { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; color: #fff; }
  .info { padding: 9px 10px 12px; }
  .title { font-size: 12px; font-weight: 500; line-height: 1.35; color: #f0f0f0; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
  .year { font-size: 11px; color: #555; }
  .rating { font-size: 11px; font-weight: 500; color: #E24B4A; display: flex; align-items: center; gap: 2px; }
  .star { width: 9px; height: 9px; fill: #E24B4A; }
  /* Player */
  #player-view { display: none; padding: 0 1rem 2rem; }
  #player-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  #back-btn { padding: 7px 14px; background: transparent; border: 1px solid #2a2a2a; color: #999; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: border-color .15s, color .15s; }
  #back-btn:hover { border-color: #E24B4A; color: #E24B4A; }
  #now-playing { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; flex: 1; color: #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #server-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  #server-row span { font-size: 11px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
  .srv-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid #2a2a2a; background: transparent; color: #888; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .15s; }
  .srv-btn:hover, .srv-btn.active { background: #E24B4A; color: #fff; border-color: #E24B4A; }
  #iframe-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; border: 1px solid #1e1e1e; background: #000; }
  #iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  #ep-controls { display: none; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  #ep-controls label { font-size: 12px; color: #666; }
  #ep-controls input { width: 64px; padding: 6px 10px; font-size: 13px; border-radius: 8px; border: 1px solid #2a2a2a; background: #161616; color: #f0f0f0; font-family: 'DM Sans', sans-serif; outline: none; }
  #ep-controls input:focus { border-color: #E24B4A; }
  #load-ep-btn { padding: 7px 16px; background: #E24B4A; color: #fff; border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; cursor: pointer; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .badge { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
  .badge-anime { background: #6c3fc5; color: #fff; }
</style>
</head>
<body>

<div id="hero">
  <h1>WATCH<span>.</span>MODE</h1>
  <p>Powered by SuperEmbed &amp; TMDB</p>
</div>

<div id="tabs">
  <button class="tab active" onclick="setType('movie', this)">Films</button>
  <button class="tab" onclick="setType('tv', this)">Series</button>
  <button class="tab" onclick="setType('anime', this)">Anime</button>
</div>

<div id="searchbar">
  <input id="search-input" type="text" placeholder="Zoek een film of serie…" onkeydown="if(event.key==='Enter') doSearch()">
  <button id="search-btn" onclick="doSearch()">Zoeken</button>
</div>

<div id="status"></div>
<div id="section-label"></div>
<div id="grid"></div>

<div id="player-view">
  <div id="player-header">
    <button id="back-btn" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Terug
    </button>
    <div id="now-playing"></div>
  </div>

  <!-- Server keuze -->
  <div id="server-row">
    <span>Server:</span>
    <button class="srv-btn active" onclick="switchServer('2embed', this)">2Embed</button>
    <button class="srv-btn" onclick="switchServer('autoembed', this)">AutoEmbed</button>
    <button class="srv-btn" onclick="switchServer('superembed', this)">SuperEmbed</button>
    <button class="srv-btn" onclick="switchServer('apiplayer', this)">ApiPlayer</button>
  </div>

  <div id="iframe-wrap">
    <iframe id="player-frame" allowfullscreen allow="fullscreen; autoplay; encrypted-media"></iframe>
  </div>

  <div id="ep-controls">
    <label>Seizoen</label>
    <input id="season-input" type="number" value="1" min="1">
    <label>Aflevering</label>
    <input id="ep-input" type="number" value="1" min="1">
    <button id="load-ep-btn" onclick="loadPlayer()">Laden</button>
  </div>
</div>

<script>
  const TMDB_KEY = 'e878d2bf930dfd081d43f4a8fe0e1c26';
  const IMG      = 'https://image.tmdb.org/t/p/w300';
  const FALLBACK = 'https://via.placeholder.com/300x450/111/333?text=Geen+poster';

  function tmdbUrl(path, params) {
    const qs = new URLSearchParams({ api_key: TMDB_KEY, ...params }).toString();
    return `https://api.themoviedb.org/3/${path}?${qs}`;
  }

  let mediaType   = 'movie';
  let currentId   = null;
  let currentServer = '2embed';

  // ── Player URL builder ────────────────────────────────────────────
  function buildUrl(server, id, type, s, e) {
    s = s || 1; e = e || 1;
    // Anime gebruikt season/episode net als TV via 2embed
    if (type === 'tv' || type === 'anime')
      return `https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}`;
    return `https://www.2embed.cc/embed/${id}`;
  }

  // ── Tabs ──────────────────────────────────────────────────────────
  function setType(type, el) {
    mediaType = type;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    if (type === 'movie')
      document.getElementById('search-input').placeholder = 'Zoek een film…';
    else if (type === 'tv')
      document.getElementById('search-input').placeholder = 'Zoek een serie…';
    else
      document.getElementById('search-input').placeholder = 'Zoek anime…';
    loadTrending();
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  // ── Zoeken ────────────────────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { loadTrending(); return; }
    setStatus('Zoeken…');
    document.getElementById('section-label').style.display = 'none';
    try {
      // Anime = zoek als tv met genre 16 (animation) via TMDB
      let url;
      if (mediaType === 'anime') {
        url = tmdbUrl('search/tv', { language: 'en-US', query: q, include_adult: 'false' });
      } else {
        url = tmdbUrl(`search/${mediaType}`, { language: 'en-US', query: q, include_adult: 'false' });
      }
      const res  = await fetch(url);
      const data = await res.json();
      let results = data.results || [];
      // Filter op animatie genre voor anime tab
      if (mediaType === 'anime') results = results.filter(r => r.genre_ids?.includes(16));
      if (results.length) {
        setStatus(`${results.length} resultaten voor "${q}"`);
        renderCards(results);
      } else {
        setStatus('Geen resultaten gevonden.');
        renderCards([]);
      }
    } catch(e) { setStatus('Fout bij ophalen. Controleer je internetverbinding.'); }
  }

  // ── Trending / populair ───────────────────────────────────────────
  async function loadTrending() {
    setStatus('Laden…');
    document.getElementById('section-label').style.display = 'none';
    try {
      let results = [];
      let label = '';
      if (mediaType === 'movie') {
        const res = await fetch(tmdbUrl('trending/movie/week', { language: 'en-US' }));
        const d   = await res.json();
        results   = d.results || [];
        label     = 'Trending films deze week';
      } else if (mediaType === 'tv') {
        const res = await fetch(tmdbUrl('trending/tv/week', { language: 'en-US' }));
        const d   = await res.json();
        results   = d.results || [];
        label     = 'Trending series deze week';
      } else {
        // Anime: populaire animatie-series via discover
        const res = await fetch(tmdbUrl('discover/tv', {
          language: 'en-US',
          with_genres: '16',
          sort_by: 'popularity.desc',
          'vote_count.gte': '100'
        }));
        const d = await res.json();
        results = d.results || [];
        label   = 'Populaire anime';
      }
      setStatus('');
      const lbl = document.getElementById('section-label');
      lbl.textContent = label;
      lbl.style.display = 'block';
      renderCards(results);
    } catch(e) { setStatus('Fout bij laden.'); }
  }

  // ── Kaarten renderen ──────────────────────────────────────────────
  function renderCards(items) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    items.slice(0, 20).forEach((item, i) => {
      const title  = item.title || item.name || '';
      const year   = (item.release_date || item.first_air_date || '').slice(0, 4);
      const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
      const poster = item.poster_path ? IMG + item.poster_path : FALLBACK;
      const isAnime = mediaType === 'anime';

      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 25) + 'ms';
      card.innerHTML = `
        <div class="poster">
          <img src="${poster}" alt="${title}" loading="lazy" onerror="this.src='${FALLBACK}'">
          <div class="overlay">
            <div class="play-circle">
              <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
            <span class="watch-lbl">Nu kijken</span>
          </div>
        </div>
        <div class="info">
          <div class="title">${title}${isAnime ? '<span class="badge badge-anime">Anime</span>' : ''}</div>
          <div class="meta">
            <span class="year">${year}</span>
            ${rating ? `<span class="rating"><svg class="star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${rating}</span>` : ''}
          </div>
        </div>`;
      card.onclick = () => playMedia(item.id, title);
      grid.appendChild(card);
    });
  }

  // ── Afspelen ──────────────────────────────────────────────────────
  function playMedia(id, title) {
    currentId = id;
    currentServer = '2embed';

    document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.srv-btn').classList.add('active');

    ['grid','searchbar','tabs','hero','status','section-label'].forEach(elId => {
      document.getElementById(elId).style.display = 'none';
    });
    document.getElementById('player-view').style.display = 'block';
    document.getElementById('now-playing').textContent = title;

    // Toon seizoen/aflevering voor series én anime
    if (mediaType === 'tv' || mediaType === 'anime') {
      document.getElementById('ep-controls').style.display = 'flex';
      document.getElementById('season-input').value = 1;
      document.getElementById('ep-input').value = 1;
    } else {
      document.getElementById('ep-controls').style.display = 'none';
    }
    loadPlayer();
  }

  function loadPlayer() {
    const s = document.getElementById('season-input')?.value || 1;
    const e = document.getElementById('ep-input')?.value || 1;
    const url = buildUrl(currentServer, currentId, mediaType, s, e);
    document.getElementById('player-frame').src = url;
  }

  function switchServer(server, el) {
    currentServer = server;
    document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    loadPlayer();
  }

  // ── Terug ─────────────────────────────────────────────────────────
  function goBack() {
    document.getElementById('player-frame').src = '';
    document.getElementById('player-view').style.display = 'none';
    document.getElementById('grid').style.display        = 'grid';
    document.getElementById('searchbar').style.display   = 'flex';
    document.getElementById('tabs').style.display        = 'flex';
    document.getElementById('hero').style.display        = 'block';
    document.getElementById('status').style.display      = 'block';
    currentId = null;
  }

  loadTrending();
</script>
</body>
</html>
